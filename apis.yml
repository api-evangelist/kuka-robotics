aid: kuka-robotics
name: KUKA
description: >-
  KUKA AG is a German industrial automation company headquartered in Augsburg,
  Bavaria, founded in 1898 and majority-owned by China's Midea Group since
  2016. KUKA designs and manufactures industrial robots, autonomous mobile
  robots (AMRs), production cells, controllers, and the software stack that
  drives them. Its product portfolio spans six-axis articulated robots (KR
  series), sensitive collaborative robots (LBR iiwa, LBR iisy), mobile
  platforms (KMR iiwa, KMP), and palletizing/welding/CNC cells, controlled by
  the KR C4 and KR C5 / KR C5 micro controller generations. The robot
  software stack centers on KUKA System Software (KSS/VSS) for KR C4-class
  hardware, the newer iiQKA.OS / iiQKA.OS2 operating system for KR C5, and
  the KUKA Robot Language (KRL) for motion programming, with extension
  surfaces including KUKA.RobotSensorInterface (RSI), KUKA.EthernetKRL,
  KUKA.PLC mxAutomation for external PLC control, KUKA.OPC UA, and
  KUKA.AppTech / iiQKA App Builder for option packages. Engineering and
  simulation are delivered through iiQWorks (iiQWorks.Sim, iiQWorks.App
  Builder, iiQWorks.Copilot) and KUKA.Sim, while operational software
  includes KUKA Xpert (documentation/cloud), KUKA iiQoT (condition
  monitoring), and KUKA Connect / my.KUKA customer portals. KUKA does not
  publish a first-party public REST/OpenAPI developer API or an official
  GitHub organization for its robot control stack; integration is performed
  through proprietary protocols (RSI, EthernetKRL, mxAutomation, OPC UA,
  PROFINET, EtherCAT) and SDKs distributed via the iiQKA Creator portal and
  KUKA Xpert. A meaningful body of open-source KUKA integration code lives
  in the community-maintained kroshu GitHub organization (ROS 2 drivers,
  external-control SDK, URDF robot descriptions) and the roboticsapi /
  openkuka projects. KUKA serves automotive, electronics, battery, metal,
  consumer goods, healthcare, aerospace, and e-commerce logistics customers,
  and through its Swisslog subsidiary extends into warehouse and intralogistics
  automation.
